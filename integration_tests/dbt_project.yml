name: 'mixpanel_integration_tests'
version: '0.17.0'
config-version: 2
profile: 'integration_tests'

models:
  +persist_docs:
    relation: true
    columns: "{{ false if target.type in ('databricks') else true }}"
  mixpanel:
    +schema: "mixpanel_{{ var('directed_schema','dev') }}"

vars:
  mixpanel_schema: mixpanel_integration_tests

  # mixpanel_sources: 
  #   - schema: mixpanel_integration_tests
  #     name: source_3
  #   - schema: mixpanel_integration_tests
  #     name: source_4

  mixpanel:
    mixpanel_event_identifier: "event"
    # has_defined_sources: true
    
seeds:
  +docs:
    show: False
  +quote_columns: "{{ target.type == 'redshift' or var('fivetran_using_source_casing', false) }}"
  mixpanel_integration_tests:
    +column_types:
      _fivetran_synced: timestamp
    event:
      +column_types:
        time: timestamp
        distinct_id: "{{ 'varchar(100)'  if target.type in ('redshift', 'postgres') else 'string'}}"
        device_id: "{{ 'varchar(100)'  if target.type in ('redshift', 'postgres') else 'string'}}"

dispatch:
  - macro_namespace: dbt_utils
    search_order: ['spark_utils', 'dbt_utils']

flags:
  send_anonymous_usage_stats: False

  use_colors: True